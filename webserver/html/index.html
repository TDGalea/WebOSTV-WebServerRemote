<!DOCTYPE HTML>
<!-- This is an extremely crude example base page. -->

<html>
	<head>
		<meta content='width=device-width, initial-scale=1' name='viewport'/>
		<meta charset="utf8" />
		<title>LG WebOS TV</title>
		<style>
			.pageCenter {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translateX(-50%) translateY(-50%);
			}

			h1 {
				color: #E0E0E0;
				font-family: calibri;
			}

			font {
				color: #E0E0E0;
				font-family: calibri;
			}

			p {
				color: #E0E0E0;
				font-family: calibri;
			}

			a {
				font-family: calibri;
			}

			hr {
				width: "95%";
			}

			table {
				border: 1px solid #303030;
				width: 80%;
				color: #FFFFFF;
				text-align: center;
			}

			td {
				border: none;
				color: #FFFFFF;
			}

			button {
				border: none;
				background-color: #303030;
				color: #FFFFFF;
				text-align: center;
				font-size: 16px;
				margin: 4px 4px;
			}

			button:hover {
				background-color: #404040;
			}

			.blButton {
				width: 45%;
				height: 45%;
			}

			.brInfoFrame {
				border: none;
				overflow: hidden;
				pointer-events: none;
			}
		</style>
	</head>
	<body bgcolor="#000000">
		<center>
			<div class="pageCenter">
				<table><tr>
					<td class="left">
						<a href="/remote">
							<button class="blButton">Remote</button>
						</a>
					</td>
				</tr></table>
			</div>
		</center>
	</body>
</html>
